services:
  # API Backend
  - type: web
    name: mercury-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build --workspace=mercury-investment-platform-api
    startCommand: npm run start --workspace=mercury-investment-platform-api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: ALLOW_MOCK_IN_PROD
        value: "true"
      - key: FRONTEND_URL
        sync: false # Should be the URL of the mercury-web service
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

  # Web Frontend (Next.js SSR)
  - type: web
    name: mercury-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build --workspace=mercury-investment-platform-web
    startCommand: npm run start --workspace=mercury-investment-platform-web
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        sync: false # Needs to point to the mercury-api URL
